<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎂 叶桃橘 的生日快乐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景粒子 */
        .particle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.6;
            animation: float linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.9);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            animation: slideIn 1s ease-out;
        }
        .music-control.playing {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            animation: pulse 2s infinite;
        }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .music-icon { font-size: 20px; }
        .music-text { font-size: 13px; }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 10;
            max-width: 90%;
            width: 400px;
            margin: 60px auto 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            animation: cardIn 1s ease-out;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(60px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 蛋糕动画 */
        .cake-box {
            text-align: center;
            margin-bottom: 20px;
        }
        .cake {
            font-size: 90px;
            display: inline-block;
            animation: bounce 2s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 26px;
            margin-bottom: 5px;
        }
        .name {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* 照片区域 */
        .photo-box {
            margin: 25px 0;
            text-align: center;
        }
        .photo-frame {
            position: relative;
            display: inline-block;
            padding: 10px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .photo-img {
            width: 100%;
            max-width: 320px;
            border-radius: 12px;
            display: block;
        }
        .photo-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #ff6b6b;
        }
        .photo-corner.tl { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .photo-corner.tr { top: -5px; right: -5px; border-left: none; border-bottom: none; }
        .photo-corner.bl { bottom: -5px; left: -5px; border-right: none; border-top: none; }
        .photo-corner.br { bottom: -5px; right: -5px; border-left: none; border-top: none; }
        .photo-caption {
            margin-top: 12px;
            color: #888;
            font-size: 14px;
        }

        /* 倒计时区域 */
        .countdown-box {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border-radius: 16px;
            padding: 20px;
            margin: 25px 0;
            text-align: center;
            color: white;
        }
        .countdown-box h3 {
            font-size: 16px;
            margin-bottom: 15px;
            opacity: 0.95;
        }
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .time-unit {
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 12px 15px;
            min-width: 60px;
        }
        .time-unit .num {
            display: block;
            font-size: 28px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        .time-unit .label {
            font-size: 12px;
            opacity: 0.9;
        }
        .birthday-message {
            font-size: 20px;
            padding: 20px;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 祝福语标签 */
        .wishes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .wish-tag {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            animation: tagIn 0.6s ease-out backwards;
        }
        .wish-tag:nth-child(1) { animation-delay: 0.1s; }
        .wish-tag:nth-child(2) { animation-delay: 0.2s; }
        .wish-tag:nth-child(3) { animation-delay: 0.3s; }
        .wish-tag:nth-child(4) { animation-delay: 0.4s; }
        .wish-tag:nth-child(5) { animation-delay: 0.5s; }
        @keyframes tagIn {
            from { opacity: 0; transform: scale(0); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 回忆区域 */
        .memories {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 20px;
            margin: 25px 0;
        }
        .memories h3 {
            color: #764ba2;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .memories ul {
            list-style: none;
        }
        .memories li {
            padding: 10px 0;
            color: #555;
            font-size: 15px;
            border-bottom: 1px dashed #e0e0e0;
            line-height: 1.6;
        }
        .memories li:last-child { border-bottom: none; }

        /* 落款 */
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #999;
            font-size: 14px;
        }
        .footer .heart {
            color: #ff6b6b;
            display: inline-block;
            animation: heartbeat 1.5s ease infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* 底部提示 */
        .hint {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 20px;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <script>
        for(let i=0; i<30; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 15 + 5) + 'px';
            p.style.background = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff'][Math.floor(Math.random()*5)];
            p.style.animationDuration = (Math.random() * 5 + 5) + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(p);
        }
    </script>

    
        <!-- 背景音乐 -->
        <audio id="bgMusic" loop>
            <source src="https://music.163.com/song/media/outer/url?id=1330348068.mp3" type="audio/mpeg">
        </audio>
        <div class="music-control" id="musicBtn" onclick="toggleMusic()">
            <span class="music-icon">🎵</span>
            <span class="music-text">点击播放音乐</span>
        </div>
        <script>
            const music = document.getElementById('bgMusic');
            let isPlaying = false;

            function toggleMusic() {
                if (isPlaying) {
                    music.pause();
                    document.getElementById('musicBtn').classList.remove('playing');
                    document.querySelector('.music-text').textContent = '点击播放音乐';
                } else {
                    music.play().catch(e => console.log('播放失败:', e));
                    document.getElementById('musicBtn').classList.add('playing');
                    document.querySelector('.music-text').textContent = '音乐播放中...';
                }
                isPlaying = !isPlaying;
            }

            // 自动尝试播放（部分浏览器可能阻止）
            window.addEventListener('click', function initMusic() {
                if (!isPlaying) {
                    toggleMusic();
                }
                window.removeEventListener('click', initMusic);
            }, { once: true });
        </script>
        

    <div class="card">
        <div class="cake-box">
            <span class="cake">🎂</span>
        </div>
        <h1>生日快乐</h1>
        <div class="name">叶桃橘</div>

        
        <div class="photo-box">
            <div class="photo-frame">
                <img src="1a7d1bddc8ef08197629b4825d35dd45.jpg" alt="我们的回忆" class="photo-img">
                <div class="photo-corner tl"></div>
                <div class="photo-corner tr"></div>
                <div class="photo-corner bl"></div>
                <div class="photo-corner br"></div>
            </div>
            <p class="photo-caption"></p>
        </div>
        

        
        <div class="countdown-box">
            <h3>⏰ 距离生日还有</h3>
            <div class="countdown" id="countdown">
                <div class="time-unit">
                    <span class="num" id="days">00</span>
                    <span class="label">天</span>
                </div>
                <div class="time-unit">
                    <span class="num" id="hours">00</span>
                    <span class="label">时</span>
                </div>
                <div class="time-unit">
                    <span class="num" id="minutes">00</span>
                    <span class="label">分</span>
                </div>
                <div class="time-unit">
                    <span class="num" id="seconds">00</span>
                    <span class="label">秒</span>
                </div>
            </div>
        </div>
        <script>
            const targetDate = new Date("2026-04-25T00:00:00");

            function updateCountdown() {
                const now = new Date();
                const diff = targetDate - now;

                if (diff <= 0) {
                    document.getElementById('countdown').innerHTML = 
                        '<div class="birthday-message">🎉 生日快乐！愿所有美好如约而至 🎉</div>';
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = String(days).padStart(2, '0');
                document.getElementById('hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        </script>
        

        <div class="wishes">
            <span class="wish-tag">天天开心</span><span class="wish-tag">万事顺遂</span><span class="wish-tag">暴富暴瘦</span><span class="wish-tag">永远少年</span><span class="wish-tag">所求皆如愿</span>
        </div>

        <div class="memories">
            <h3></h3>
            <ul>
                <li>✦ 2023年8月熟络至今</li><li>✦ 祝福我为数不多的好朋友</li>
            </ul>
        </div>

        <div class="footer">
            <span class="heart">️</span> 大哥 用心制作 <span class="heart">️</span>
        </div>
    </div>

    <div class="hint">长按保存 · 分享这份祝福</div>
</body>
</html>
